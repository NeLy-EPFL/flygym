name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Core tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            mujoco_gl: egl
            pyopengl_platform: egl
          - os: macos-latest
            mujoco_gl: osmesa
            pyopengl_platform: osmesa
          - os: windows-latest
            mujoco_gl: osmesa
            pyopengl_platform: osmesa

    # Set GL env vars before Python/pytest runs so they take precedence over
    # the os.environ.setdefault("MUJOCO_GL", "egl") in tests/conftest.py.
    env:
      MUJOCO_GL: ${{ matrix.mujoco_gl }}
      PYOPENGL_PLATFORM: ${{ matrix.pyopengl_platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install EGL/Mesa dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1-mesa-dev libgles2-mesa-dev libosmesa6-dev

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run core and examples tests
        run: uv run pytest tests/core/ tests/examples/ -v --tb=short
