name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Core tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install EGL/Mesa dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1-mesa-dev libgles2-mesa-dev libosmesa6-dev

      - name: Install Python dependencies
        run: uv sync --extra examples --extra dev

      - name: Run core and examples tests
        run: uv run pytest tests/core/ tests/examples/ -v --tb=short

  test-python-versions:
    name: Python version tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install EGL/Mesa dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1-mesa-dev libgles2-mesa-dev libosmesa6-dev

      - name: Install Python dependencies
        run: |
          uv sync --extra examples --extra dev \
            --python ${{ matrix.python-version }}

      - name: Run core and examples tests
        run: uv run pytest tests/core/ tests/examples/ -v --tb=short
